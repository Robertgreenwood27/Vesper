<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06080d" />
    <meta
      name="description"
      content="Silk Lab 08 (superseded) — a deliberate bounded multi-step black-widow traverse through a true 3D silk junction."
    />
    <title>Silk Lab 08 // superseded</title>
  </head>
  <body>
    <main id="lab" aria-label="Silk Lab silk physics laboratory">
      <canvas id="web-canvas" aria-label="Interactive simulated spider silk"></canvas>
      <div id="node-labels" aria-hidden="true"></div>

      <header class="lab-header">
        <div class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div>
          <p class="eyebrow">SILK LAB / R&amp;D</p>
          <h1>Silk Lab <em>08</em></h1>
          <p class="subtitle">ROUTE / SUPPORT / JUNCTION COMMIT</p>
        </div>
      </header>

      <aside class="interaction-hint" aria-label="Interaction instructions">
        <span class="mouse-icon" aria-hidden="true"><i></i></span>
        <div>
          <strong>Choose a branch; the spider traverses deliberately</strong>
          <span>Atomic secure steps · settle and reassess · bounded stop</span>
        </div>
      </aside>

      <div class="status-rail" aria-hidden="true">
        <span>SEMANTIC ROUTE</span>
        <i></i>
        <span>BRANCH SUPPORT</span>
        <i></i>
        <span>BODY COMMIT</span>
      </div>

      <div id="tension-legend" class="tension-legend" aria-label="Relative tension heatmap legend">
        <span>TENSION / RELATIVE LOAD</span>
        <i></i>
        <div><small>LOW</small><small>HIGH</small></div>
      </div>

      <div class="connectivity-key" aria-label="Locomotion candidate visualization key">
        <span><i class="key-connected"></i>ACCEPTED / SECURE</span>
        <span><i class="key-crossing"></i>REJECTED / NON-TOPOLOGICAL</span>
      </div>

      <div id="debug-root"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
